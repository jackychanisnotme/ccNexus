name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
  WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
  WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

jobs:
  site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Test site
        run: npm test
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: AINexus-site
          path: site/dist

  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: amd64
          - os: windows-latest
            platform: windows
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install npm dependencies
        run: |
          cd cmd/desktop/frontend
          npm install
        shell: bash

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: ${{ runner.os }}-wails-v2.10.2

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Initialize release status
        run: |
          echo "AINEXUS_SIGNING_STATUS=unsigned" >> "$GITHUB_ENV"
          echo "AINEXUS_NOTARIZATION_STATUS=not_applicable" >> "$GITHUB_ENV"
        shell: bash

      - name: Install Wails (Linux)
        if: matrix.platform == 'linux' && steps.cache-wails.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config
          for pcdir in $(pkg-config --variable pc_path pkg-config | tr ':' ' '); do
            if [ -f "$pcdir/webkit2gtk-4.1.pc" ]; then
              sudo ln -sf "$pcdir/webkit2gtk-4.1.pc" "$pcdir/webkit2gtk-4.0.pc"
            fi
          done
          pkg-config --exists webkit2gtk-4.0
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies (cached)
        if: matrix.platform == 'linux' && steps.cache-wails.outputs.cache-hit == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config
          for pcdir in $(pkg-config --variable pc_path pkg-config | tr ':' ' '); do
            if [ -f "$pcdir/webkit2gtk-4.1.pc" ]; then
              sudo ln -sf "$pcdir/webkit2gtk-4.1.pc" "$pcdir/webkit2gtk-4.0.pc"
            fi
          done
          pkg-config --exists webkit2gtk-4.0

      - name: Install Wails (macOS)
        if: matrix.platform == 'darwin' && steps.cache-wails.outputs.cache-hit != 'true'
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Wails (Windows)
        if: matrix.platform == 'windows' && steps.cache-wails.outputs.cache-hit != 'true'
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
        shell: pwsh

      - name: Build application (Linux/macOS)
        if: matrix.platform != 'windows'
        env:
          CGO_ENABLED: 1
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          cd cmd/desktop
          if [ "${{ matrix.platform }}" == "linux" ]; then
            export CGO_CFLAGS="$(pkg-config --cflags gtk+-3.0 webkit2gtk-4.0)"
            export CGO_LDFLAGS="$(pkg-config --libs gtk+-3.0 webkit2gtk-4.0)"
            export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:${PKG_CONFIG_PATH}"
          fi
          wails build -platform ${{ matrix.platform }}/${{ matrix.arch }}

      - name: Build application (Windows)
        if: matrix.platform == 'windows'
        run: |
          $env:PATH += ";$(go env GOPATH)\bin"
          cd cmd/desktop
          wails build -platform ${{ matrix.platform }}/${{ matrix.arch }}
        shell: pwsh

      - name: Import Apple signing certificate
        if: >-
          matrix.platform == 'darwin' &&
          env.APPLE_CERTIFICATE_P12_BASE64 != '' &&
          env.APPLE_CERTIFICATE_PASSWORD != '' &&
          env.APPLE_TEAM_ID != '' &&
          env.APPLE_ID != '' &&
          env.APPLE_APP_SPECIFIC_PASSWORD != ''
        env:
          KEYCHAIN_PASSWORD: ainexus-ci-keychain
        run: |
          CERT_PATH="$RUNNER_TEMP/ainexus-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/ainexus-signing.keychain-db"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign and notarize macOS app
        if: >-
          matrix.platform == 'darwin' &&
          env.APPLE_CERTIFICATE_P12_BASE64 != '' &&
          env.APPLE_CERTIFICATE_PASSWORD != '' &&
          env.APPLE_TEAM_ID != '' &&
          env.APPLE_ID != '' &&
          env.APPLE_APP_SPECIFIC_PASSWORD != ''
        run: |
          APP_PATH="cmd/desktop/build/bin/AINexus.app"
          SIGNING_IDENTITY="$(security find-identity -v -p codesigning | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "No Developer ID Application identity found" >&2
            exit 1
          fi
          codesign --deep --force --options runtime --timestamp --sign "$SIGNING_IDENTITY" "$APP_PATH"
          TEMP_ZIP="$RUNNER_TEMP/AINexus-${{ steps.get_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}-notary.zip"
          ditto -c -k --keepParent "$APP_PATH" "$TEMP_ZIP"
          xcrun notarytool submit "$TEMP_ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$APP_PATH"
          spctl --assess --type execute --verbose "$APP_PATH"
          echo "AINEXUS_SIGNING_STATUS=signed" >> "$GITHUB_ENV"
          echo "AINEXUS_NOTARIZATION_STATUS=notarized" >> "$GITHUB_ENV"

      - name: Sign Windows executable
        if: >-
          matrix.platform == 'windows' &&
          env.WINDOWS_CERTIFICATE_PFX_BASE64 != '' &&
          env.WINDOWS_CERTIFICATE_PASSWORD != ''
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "ainexus-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) {
            throw "signtool.exe not found"
          }
          & $signtool sign /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 cmd\desktop\build\bin\AINexus.exe
          "AINEXUS_SIGNING_STATUS=signed" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      - name: Package application (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd cmd/desktop/build/bin
          tar -czf AINexus-${{ steps.get_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz AINexus
          mv AINexus-${{ steps.get_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz ../../../../

      - name: Package application (macOS)
        if: matrix.platform == 'darwin'
        run: |
          cd cmd/desktop/build/bin
          if [ -d "AINexus.app" ]; then
            ditto -c -k --keepParent "AINexus.app" AINexus-${{ steps.get_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.zip
          else
            tar -czf AINexus-${{ steps.get_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz AINexus
          fi
          mv AINexus-${{ steps.get_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.* ../../../../

      - name: Package application (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd cmd/desktop/build/bin
          Compress-Archive -Path AINexus.exe -DestinationPath ../../../../AINexus-${{ steps.get_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.zip
        shell: pwsh

      - name: Generate checksum and manifest (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          artifact="$(ls AINexus-${{ steps.get_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.* | grep -E '\.(tar\.gz|zip)$' | head -n1)"
          sha256="$(shasum -a 256 "$artifact" | awk '{print $1}')"
          echo "$sha256  $artifact" > "$artifact.sha256"
          cat > "AINexus-${{ steps.get_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.manifest.json" <<EOF
          {
            "name": "$artifact",
            "version": "${{ steps.get_version.outputs.version }}",
            "platform": "${{ matrix.platform }}",
            "arch": "${{ matrix.arch }}",
            "sha256": "$sha256",
            "signingStatus": "$AINEXUS_SIGNING_STATUS",
            "notarizationStatus": "$AINEXUS_NOTARIZATION_STATUS"
          }
          EOF

      - name: Generate checksum and manifest (Windows)
        if: matrix.platform == 'windows'
        run: |
          $artifact = Get-ChildItem "AINexus-${{ steps.get_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.*" |
            Where-Object { $_.Extension -eq ".zip" } |
            Select-Object -First 1
          $sha256 = (Get-FileHash -Algorithm SHA256 $artifact.FullName).Hash.ToLowerInvariant()
          "$sha256  $($artifact.Name)" | Out-File -Encoding ascii "$($artifact.Name).sha256"
          @{
            name = $artifact.Name
            version = "${{ steps.get_version.outputs.version }}"
            platform = "${{ matrix.platform }}"
            arch = "${{ matrix.arch }}"
            sha256 = $sha256
            signingStatus = $env:AINEXUS_SIGNING_STATUS
            notarizationStatus = $env:AINEXUS_NOTARIZATION_STATUS
          } | ConvertTo-Json | Out-File -Encoding utf8 "AINexus-${{ steps.get_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.manifest.json"
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AINexus-${{ steps.get_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            AINexus-*.tar.gz
            AINexus-*.zip
            AINexus-*.sha256
            AINexus-*.manifest.json

  release:
    needs:
      - build
      - site
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: AINexus-*-*-*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
